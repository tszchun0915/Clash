    geoip: true
    geoip-code: CN
geo-auto-update: true
geo-update-interval: 24
geodata-loader: standard
geox-url:
  geoip: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat
  geosite: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
  mmdb: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb
  asn: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb
sniffer:
  enable: false
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports:
        - 80
        - 443
      override-destination: false
    TLS:
      ports:
        - 443
    QUIC:
      ports:
        - 443
        - 8443
  skip-domain:
    - +.push.apple.com
  force-domain: []
  skip-dst-address:
    - 91.105.192.0/23
    - 91.108.4.0/22
    - 91.108.8.0/21
    - 91.108.16.0/21
    - 91.108.56.0/22
    - 95.161.64.0/20
    - 149.154.160.0/20
    - 185.76.151.0/24
    - 2001:67c:4e8::/48
    - 2001:b28:f23c::/47
    - 2001:b28:f23f::/48
    - 2a0a:f280:203::/48
  skip-src-address: []
proxy-groups:
  - name: 🚀 Default
    type: select
    proxies:
      - ❇️ LOCAL
      - PROXY
      - 🇨🇳 China
      - 🇭🇰 HongKong
      - 🇹🇼 Taiwan
      - 🇺🇸 USA
      - 🇰🇷 Korea
      - 🇯🇵 Japan
      - 🇸🇬 Singapore
      - 🇲🇾 Malaysia
      - 🇹🇭 Thailand
      - 🇦🇷 Argentina
      - 🇹🇷 Turkey
      - 🇷🇺 Russian
  - name: 🔒 Safe
    type: select
    proxies:
      - 🚀 Default
      - PROXY
      - ❇️ LOCAL
  - name: 🧠 AI
    type: select
    proxies:
      - 🚀 Default
      - 🇺🇸 USA
      - PROXY
      - ❇️ LOCAL
  - name: 🎥 Netflix
    type: select
    proxies:
      - 🚀 Default
      - 🇺🇸 USA
      - PROXY
      - ❇️ LOCAL
  - name: 🎬 Disney+
    type: select
    proxies:
      - 🚀 Default
      - 🇺🇸 USA
      - PROXY
      - ❇️ LOCAL
  - name: 🫂 dcard
    type: select
    proxies:
      - 🚀 Default
      - 🇹🇼 Taiwan
      - PROXY
      - ❇️ LOCAL
  - name: 🍎 Apple服務
    type: select
    proxies:
      - ❇️ LOCAL
      - 🚀 Default
      - 🇭🇰 HongKong
      - PROXY
  - name: PROXY
    type: select
    include-all: true
  - name: ❇️ LOCAL
    type: select
    proxies:
      - DIRECT
  - name: 🇭🇰 HongKong
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    filter: (?i)(?=.*(?:🇭🇰|香|港|香港|香江|深港|沪港|京港|香岛|湾仔|港仔|九龙|铜锣湾|旺角|HK|Hong|HongKong)).*(?!.*(?:台湾|日本|新加坡|美国|韩国|狮城|南朝鲜|US|SG|JP|KR|TW|台灣|美國|韓國|獅城))
  - name: 🇹🇼 Taiwan
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    filter: (?i)(?=.*(?:🇹🇼|台|台湾|台北|新北|桃园|台中|台南|高雄|基隆|新竹|嘉义|苗栗|彰化|南投|云林|屏东|台东|花莲|宜兰|澎湖|金门|连江|TW|Taiwan)).*(?!.*(?:港|日|韩|新|美))
  - name: 🇺🇸 USA
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    filter: (?i)(?=.*(?:🇺🇸|美|美国|纽约|沪美|美利坚合众国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|华盛顿|内华达|蒙大纳|怀俄明州|菲尼克斯|阿尔伯克基|丹佛|US|United
      States|States|American|America)).*(?!.*(?:香港|台湾|新加坡|狮城|南朝鲜|SG|KR|HK|TW|台灣|韓國|獅城))
  - name: 🇰🇷 Korea
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    filter: (?i)(?=.*(?:🇰🇷|韩|韩国|南韩|南朝鲜|高丽|大韩民国|首尔|世宗|济州市|水原|釜山|大邱|仁川|光州|大田|蔚山|KR|Korea|Korean|South
      Korea)).*(?!.*(?:香港|台湾|新加坡|美国|狮城|南朝|US|UK|SG|HK|TW|台灣|美國|獅城|UKRAINE))
  - name: 🇯🇵 Japan
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    filter: (?i)(?=.*(?:🇯🇵|日|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|名古屋|福冈|仙台|京都|Tokyo|tokyo)).*(?!.*(?:香港|台湾|新加坡|美国|韩国|狮城|南朝鲜|US|SG|KR|HK|TW|台灣|美國|韓國|獅城))
  - name: 🇸🇬 Singapore
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    filter: (?i)(?=.*(?:🇸🇬|新|狮|獅|坡|新加坡|星|星加坡|星洲|狮城|SG|Singapore)).*(?!.*(?:香港|台湾|日本|美国|韩国|南朝鲜|US|JP|KR|HK|TW|台灣|美國|韓國))
  - name: 🇲🇾 Malaysia
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    filter: (?i)(?=.*(?:🇲🇾|馬來西亞|Malaysia|马来西亚))
  - name: 🇹🇭 Thailand
