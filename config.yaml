mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
udp: true
tcp-concurrent: true
unified-delay: true
global-ua: clash.party
profile:
  store-selected: true
  store-fake-ip: true
external-controller: ""
secret: ""
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  route-exclude-address: []
  device: Mihomo
  auto-redirect: false
  mtu: 1500
  strict-route: false
dns-server:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - +.icloud.com
    - +.apple.com
    - +.icitymobile.mobi
    - +.cmbchina.com
    - msftconnecttest.com
    - msftncsi.com
    - +.msftconnecttest.com
    - +.msftncsi.com
    - +.srv.nintendo.net
    - +.stun.playstation.net
    - xbox.*.microsoft.com
    - +.xboxlive.com
    - +.battlenet.com.cn
    - +.battlenet.com
    - +.battle.net
    - 18u8qxgf9h.execute-api.us-east-1.amazonaws.com
    - php2.opentimeclock.com
    - "*.local"
    - localhost.ptlogin2.qq.com
    - geosite:cn
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  cache-algorithm: arc
  prefer-h3: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - https://cloudflare-dns.com/dns-query
  fallback:
