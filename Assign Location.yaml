# ==================== [Merge Keys] & [General] & [DNS Configuration (Balanced & Secure)] & [GEO & Providers] ====================
Default: &Default {type: select, proxies: [DIRECT, "🇨🇳 China", "🇭🇰 HongKong", "🇹🇼 Taiwan", "🇺🇸 USA", "🇰🇷 Korea", "🇯🇵 Japan", "🇸🇬 Singapore", "🇹🇭 Thailand", "🇹🇷 Turkey"]}
select-app: &select-app {type: select, proxies: [🚀 Default, DIRECT, "🇨🇳 China", "🇭🇰 HongKong", "🇹🇼 Taiwan", "🇺🇸 USA", "🇰🇷 Korea", "🇯🇵 Japan", "🇸🇬 Singapore", "🇹🇭 Thailand", "🇹🇷 Turkey"]}
url-test-country: &url-test-country {type: url-test, include-all: true, interval: 600, tolerance: 50}
rule-provider: &rule-provider {type: http, behavior: classical, interval: 3600}
airport: &airport {type: http, interval: 21600, health-check: {enable: true, interval: 300, timeout: 500, url: 'http://captive.apple.com/generate_204', expected-status: 204, lazy: true, proxy: DIRECT}}

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
udp: true
tcp-concurrent: true
unified-delay: true
global-ua: clash.party
profile: {store-selected: true, store-fake-ip: true}
find-process-mode: strict
tun: {enable: true, stack: system, auto-route: true, auto-detect-interface: true, dns-hijack: ["any:53"], device: Mihomo, mtu: 1500}
sniffer: {enable: true, force-dns-mapping: true, parse-pure-ip: true, sniff: {HTTP: {ports: [80, 443]}, TLS: {ports: [443]}, QUIC: {ports: [443]}}, skip-domain: ["+.push.apple.com"]}

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: true
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: true
  fake-ip-filter: ["+.lan", "+.local", "localhost.pt", "+.apple.com", "+.icloud.com", "+.line-apps.com", "+.tw-monstere-strike.xflag.com", "+.msftconnecttest.com", "+.msftncsi.com"]
  default-nameserver: [1.1.1.1, 8.8.8.8, 1.0.0.1]
  nameserver: ["https://1.1.1.1/dns-query", "https://dns.google/dns-query"]
  proxy-server-nameserver: ["https://1.1.1.1/dns-query"]
  fallback: ["https://1.0.0.1/dns-query", "https://dns.quad9.net/dns-query"]
  fallback-filter: {geoip: true, geoip-code: CN, ipcidr: [240.0.0.0/4]}

geo-auto-update: true
geo-update-interval: 24
geodata-loader: standard
geox-url: {geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat", geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat", mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb", asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"}

# ==================== Proxy-Groups ====================
proxy-groups:
  - {name: 🚀 Default, <<: *Default}
  - {name: 🔒 Safe, type: select, proxies: [DIRECT, 🚀 Default]}
  - {name: 🇨🇳 China, type: select, proxies: [DIRECT, China (VPN)]}
  - {name: 🇭🇰 HongKong, type: select, proxies: [DIRECT, HongKong (VPN)]}
  - {name: 🇹🇼 Taiwan, type: select, proxies: [DIRECT, Taiwan (VPN)]}
  - {name: 🇺🇸 USA, type: select, proxies: [DIRECT, USA (VPN)]}
  - {name: 🇰🇷 Korea, type: select, proxies: [DIRECT,Korea (VPN)]}
  - {name: 🇯🇵 Japan, type: select, proxies: [DIRECT,Japan (VPN)]}
  - {name: 🇸🇬 Singapore, type: select, proxies: [DIRECT,Singapore (VPN)]}
  - {name: 🇹🇭 Thailand, type: select, proxies: [DIRECT,Thailand (VPN)]}
  - {name: 🇹🇷 Turkey, type: select, proxies: [DIRECT,Turkey (VPN)]}
  - {name: 👟 HKTR, <<: *select-app}
  - {name: 🧠 AI, <<: *select-app}
  - {name: 📺 AniGamer, <<: *select-app}
  - {name: 🫂 Telegram, <<: *select-app}
  - {name: 🫂 dcard, <<: *select-app}
  - {name: ⏳ Tiktok, <<: *select-app}
  - {name: 🖥️ bilibili, <<: *select-app}
  - {name: China (VPN), <<: *url-test-country, url: http://tr.8yx.com, filter: '(?=.*((?i)Aliyun|CN|China))^((?!(香港|台湾|新加坡|狮城|南朝鲜|SG|KR|HK|TW|台灣|韓國|獅城)).)*$'}
  - {name: HongKong (VPN), <<: *url-test-country, url: http://funtown.com.hk, filter: '(?=.*((?i)🇭🇰|香|港|香港|香江|深港|沪港|京港|香島|灣仔|港仔|九龍|銅鑼灣|旺角|HK|Hong|HongKong|🏡|Home|Peter|🏠))^((?!(台灣|日本|新加坡|美國|韓國|獅城|南朝鮮|US|SG|JP|KR|TW|台灣|美國|韓國|獅城)).)*$'}
  - {name: Taiwan (VPN), <<: *url-test-country, url: http://funtown.com.hk, filter: '(?=.*((?i)🇹🇼|台|台灣|台北|新北|桃園|台中|台南|高雄|基隆|新竹|嘉義|苗栗|彰化|南投|雲林|屏東|台東|花蓮|宜蘭|澎湖|金門|連江|TW|Taiwan|Tai wan))^((?!(港|日|韓|新|美)).)*$'}
  - {name: USA (VPN), <<: *url-test-country, url: http://talesrunner.us, filter: '(?=.*((?i)🇺🇸|美|美國|紐約|滬美|美利堅合衆國|波特蘭|達拉斯|俄勒岡|鳳凰城|費利蒙|硅谷|拉斯維加斯|洛杉磯|聖何塞|聖克拉拉|西雅圖|芝加哥|華盛頓|內華達|蒙大納|懷俄明州|菲尼克斯|阿爾伯克基|丹佛|United States|States|American|America|america))^((?!(香港|台灣|新加坡|獅城|南朝鮮|SG|KR|HK|TW|台灣|韓國|獅城)).)*$'}
  - {name: Korea (VPN), <<: *url-test-country, url: http://tr.rhaon.co.kr, filter: '(?=.*((?i)🇰🇷|韓|韓國|南韓|南朝鮮|高麗|大韓民國|首爾|世宗|濟州市|水原|釜山|大邱|仁川|光州|大田|蔚山|KR|Korea|Korean|South Korea|韓|KOR|春川))^((?!(香港|台灣|新加坡|美國|獅城|南朝|US|UK|SG|HK|TW|台灣|美國|獅城|UKRAINE)).)*$'}
  - {name: Japan (VPN), <<: *url-test-country, url: http://github.com, filter: '(?=.*((?i)🇯🇵|日本|川日|東京|大阪|泉日|埼玉|滬日|深日|JP|Japan|名古屋|福岡|仙台|京都|Japan|京日|蘇日|上日|廣日|Tokyo|tokyo))^((?!(香港|台灣|新加坡|美國|韓國|獅城|南朝鮮|US|SG|KR|HK|TW|台灣|美國|韓國|獅城)).)*$'}
  - {name: Singapore (VPN), <<: *url-test-country, url: http://sgx.com, filter: '(?=.*((?i)🇸🇬|新|獅|獅|坡|新加坡|星|星加坡|星洲|獅城|SG|Singapore|Sing|sing|滬新|京新|深新|杭新|廣新))^((?!(香港|台灣|日本|美國|韓國|南朝鮮|US|JP|KR|HK|TW|台灣|美國|韓國)).)*$'}
  - {name: Thailand (VPN), <<: *url-test-country, url: http://talesrunner.thehof.gg, filter: "泰國|🇹🇭|Thai|Thailand"}
  - {name: Turkey (VPN), <<: *url-test-country, url: http://tcmb.gov.tr, filter: "土耳其|Turkey|🇹🇷"}

