# === Apple 服務域名規則（完整整理版，2026年3月） ===
# 目標：完整覆蓋 App Store、iCloud、更新、媒體等，移除重複，中國大陸/國際通用

# App Store & iTunes
  - DOMAIN,apps.apple.com
  - DOMAIN,itunes.apple.com
  - DOMAIN,buy.itunes.apple.com

# TestFlight
  - DOMAIN,beta.apple.com
  - DOMAIN,testflight.apple.com
  - DOMAIN-KEYWORD,testflight

# iCloud Private Relay（重要，刪除會影響隱私或 Mail 圖片載入）
