  - DOMAIN,mask-api.icloud.com
  - DOMAIN,mask-t.apple-dns.net
  - DOMAIN,mask.apple-dns.net
  - DOMAIN-SUFFIX,mask-h2.icloud.com
  - DOMAIN-SUFFIX,mask.icloud.com

# Apple Media / Streaming / News / Music / TV
